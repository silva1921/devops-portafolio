#Anatomía de un pipeline de GitHub Actions para desplegar un portafolio DevOps
#Fluo del pipeline
name: Deploy Portafolio DevOps

#Quiene ejecuta laa acción
run-name: ${{github.actor}}

# Se ejecuta el pipeline cada vez que se hace un push a las ramas main o dev
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    path:
      - "**.md"

# EL jobs se ejecuta en un runner de Ubuntu y consta de varios pasos, como hacer checkout del código, configurar Docker
# Cada jobs se puede ejecutar en un seevidor disitinto
jobs:
  job1:
    environment: ${{github.ref_name == 'main' && 'produccion' || 'desarrollo'}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - run: ls -la

      - name: print mesaage
        run: echo "Hola, ${{vars.NAME}} esta es una variable de entorno"

  job2:
    needs: job1
    environment: produccion
    runs-on: ubuntu-latest
    steps:
      - name: print mesaage
        run: echo "Hola, ${{vars.NAME}} esta es una variable de entorno secreta"
